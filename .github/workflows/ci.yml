name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -timeout 5m ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod
          cache: true
          cache-dependency-path: api/go.sum

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m
          working-directory: api

  build-test-cli:
    name: Build & test (cli)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: cli/go.mod
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -timeout 5m ./...

  lint-cli:
    name: Lint (cli)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: cli/go.mod
          cache: true
          cache-dependency-path: cli/go.sum

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m
          working-directory: cli
